<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>

  <body class="bg-slate-50 text-slate-900">
    <header class="max-w-5xl mx-auto px-4 pt-10">
      <h1 class="text-4xl font-extrabold tracking-tight">
        Job Application Tracker
      </h1>

      <!-- Stats -->
      <header>
        <div class="mt-6 grid grid-cols-1 md:grid-cols-3 gap-5">
          <div
            class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm"
          >
            <p class="text-sm text-gray-500">Total</p>
            <p id="total" class="mt-2 text-3xl font-bold text-blue-700">0</p>
          </div>

          <div
            class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm"
          >
            <p class="text-sm text-gray-500">Interview</p>
            <p
              id="interviewCount"
              class="mt-2 text-3xl font-bold text-emerald-600"
            >
              0
            </p>
          </div>

          <div
            class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm"
          >
            <p class="text-sm text-gray-500">Rejected</p>
            <p id="rejectedCount" class="mt-2 text-3xl font-bold text-red-500">
              0
            </p>
          </div>
        </div>
      </header>

      <hr class="my-8 border-gray-300" />
    </header>

    <main class="max-w-5xl mx-auto px-4 pb-16">
      <!-- Section Header -->
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-semibold">Available Jobs</h2>
        <p class="text-sm text-gray-500">
          <span id="jobsCountText">0</span> jobs
        </p>
      </div>

      <!-- Filters -->
      <div
        class="mt-4 inline-flex rounded-lg bg-white border border-gray-200 p-1 shadow-sm"
      >
        <button
          id="all-filter-btn"
          onclick="toggleStyle('all-filter-btn')"
          class="px-4 py-2 text-sm font-medium rounded-md bg-blue-600 text-white"
        >
          All
        </button>
        <button
          id="interview-filter-btn"
          onclick="toggleStyle('interview-filter-btn')"
          class="px-4 py-2 text-sm font-medium rounded-md text-gray-600"
        >
          Interview
        </button>
        <button
          id="rejected-filter-btn"
          onclick="toggleStyle('rejected-filter-btn')"
          class="px-4 py-2 text-sm font-medium rounded-md text-gray-600"
        >
          Rejected
        </button>
      </div>

      <!-- Cards wrapper -->
      <section class="mt-6 space-y-5">
        <!-- Filtered cards -->
        <div id="filtered-section" class="hidden space-y-5"></div>

        <!-- All cards -->
        <div id="allCards" class="space-y-5"></div>

        <!-- Empty state -->
        <div id="emptyState" class="hidden">
          <div
            class="bg-white border border-gray-200 rounded-2xl p-16 shadow-sm text-center"
          >
            <div class="mx-auto w-16 h-16 rounded-2xl justify-center">
              <!-- No jobs icon -->
              <div><img src="jobs.png" alt="" /></div>
            </div>

            <h3 class="mt-6 text-xl font-semibold">No jobs available</h3>
            <p class="mt-2 text-gray-500">
              Check back soon for new job opportunities
            </p>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
